name: Extract WinGet icons

on:
  workflow_dispatch:
    inputs:
      package_ids_csv:
        description: 'Comma-separated winget package IDs to process (maximum 25).'
        required: true
        type: string
      uninstall_after:
        description: 'Uninstall each package after icon extraction'
        required: false
        default: true
        type: boolean
      per_package_timeout:
        description: 'Per-package install timeout (seconds)'
        required: false
        default: '600'
        type: string
      auto_commit_results:
        description: 'Commit the refreshed winget-app-icons package folders back to the repo'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: extract-icons-${{ github.ref }}
  cancel-in-progress: false

jobs:
  extract:
    name: Extract requested package batch
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify winget
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          $v = winget --version 2>$null
          if ($LASTEXITCODE -ne 0) { throw 'winget CLI not available.' }
          Write-Host "winget version: $v"

      - name: Update winget sources
        shell: pwsh
        continue-on-error: true
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          winget source update --accept-source-agreements --disable-interactivity
          exit 0

      - name: Install Yayaml PowerShell module
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Yayaml)) {
              Install-Module -Name Yayaml -Scope CurrentUser -Force -AcceptLicense -Repository PSGallery
          }
          Import-Module Yayaml -ErrorAction Stop

      - name: Validate requested packages
        id: packages
        shell: pwsh
        env:
          PACKAGE_IDS_CSV: ${{ inputs.package_ids_csv }}
        run: |
          $ErrorActionPreference = 'Stop'
          [void](New-Item -ItemType Directory -Path out -Force)

          $packages = @($env:PACKAGE_IDS_CSV -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          if (-not $packages -or $packages.Count -eq 0) {
              throw 'Provide at least one winget package ID.'
          }

          $duplicates = @($packages | Group-Object -CaseSensitive | Where-Object Count -gt 1 | Select-Object -ExpandProperty Name)
          if ($duplicates.Count -gt 0) {
              throw ("Duplicate package IDs are not allowed: {0}" -f ($duplicates -join ', '))
          }

          if ($packages.Count -gt 25) {
              throw ("At most 25 package IDs are allowed per run. Received {0}." -f $packages.Count)
          }

          $invalidChars = [System.IO.Path]::GetInvalidFileNameChars()
          $invalidPackages = @(
              $packages | Where-Object {
                  $_.IndexOfAny($invalidChars) -ge 0 -or
                  $_.EndsWith(' ') -or
                  $_.EndsWith('.')
              }
          )
          if ($invalidPackages.Count -gt 0) {
              throw ("These package IDs are not safe as folder names: {0}" -f ($invalidPackages -join ', '))
          }

          $payload = [ordered]@{
              generatedAtUtc = (Get-Date).ToUniversalTime().ToString('o')
              count          = $packages.Count
              packages       = $packages
          }

          $payload | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath out/requested-packages.json -Encoding UTF8
          $packages | Set-Content -LiteralPath out/requested-packages.txt -Encoding UTF8

          "count=$($packages.Count)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "artifact_name=winget-icon-batch-${{ github.run_id }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          "## Requested packages" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Count: **$($packages.Count)**" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Auto-commit: **${{ inputs.auto_commit_results }}**" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Uninstall after extraction: **${{ inputs.uninstall_after }}**" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          foreach ($pkg in $packages) {
              "- ``$pkg``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

      - name: Run extraction batch
        shell: pwsh
        env:
          PKG_TIMEOUT: ${{ inputs.per_package_timeout || '600' }}
          UNINSTALL_AFTER: ${{ inputs.uninstall_after && 'true' || 'false' }}
        run: |
          $ErrorActionPreference = 'Stop'
          $requested = Get-Content -LiteralPath out/requested-packages.json -Raw -Encoding UTF8 | ConvertFrom-Json

          $params = @{
              Packages                 = @($requested.packages)
              OutDir                   = 'out/icons'
              SummaryPath              = 'out/summary.json'
              PackageStateRoot         = 'winget-app-icons'
              PerPackageTimeoutSeconds = [int]$env:PKG_TIMEOUT
              Force                    = $true
          }
          if ($env:UNINSTALL_AFTER -eq 'true') {
              $params['UninstallAfter'] = $true
          }

          & ./scripts/Invoke-BulkIconExtraction.ps1 @params

      - name: Render extraction summary
        if: always()
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath 'out/summary.json')) {
              "## Extraction summary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
              "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
              "No summary was produced." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
              return
          }

          $payload = Get-Content -LiteralPath 'out/summary.json' -Raw -Encoding UTF8 | ConvertFrom-Json
          $lines = New-Object System.Collections.Generic.List[string]
          $lines.Add('## Extraction summary')
          $lines.Add('')
          $lines.Add(("- Processed: **{0}**" -f $payload.Processed))
          $lines.Add(("- Total result rows: **{0}**" -f $payload.Total))
          $lines.Add('')
          $lines.Add('| Status | Count |')
          $lines.Add('| --- | ---: |')
          foreach ($prop in $payload.StatusCounts.PSObject.Properties) {
              $lines.Add(("| {0} | {1} |" -f $prop.Name, $prop.Value))
          }
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Build merge-ready batch archive
        if: always()
        shell: pwsh
        env:
          BATCH_ZIP_NAME: winget-app-icons-batch-${{ github.run_id }}.zip
        run: |
          $ErrorActionPreference = 'Stop'
          $requested = Get-Content -LiteralPath out/requested-packages.json -Raw -Encoding UTF8 | ConvertFrom-Json

          $repoRoot = (Resolve-Path '.').Path
          $stageRoot = Join-Path $repoRoot 'out/artifact-root'
          $batchRoot = Join-Path $stageRoot 'winget-app-icons'
          $zipDir = Join-Path $repoRoot 'out/artifacts'

          if (Test-Path -LiteralPath $stageRoot) {
              Remove-Item -LiteralPath $stageRoot -Recurse -Force
          }
          [void](New-Item -ItemType Directory -Path $batchRoot -Force)
          [void](New-Item -ItemType Directory -Path $zipDir -Force)

          foreach ($pkg in $requested.packages) {
              $src = Join-Path (Join-Path $repoRoot 'winget-app-icons') $pkg
              if (-not (Test-Path -LiteralPath $src -PathType Container)) {
                  Write-Warning "Processed package folder '$pkg' was not created."
                  continue
              }

              $dest = Join-Path $batchRoot $pkg
              [void](New-Item -ItemType Directory -Path $dest -Force)
              Get-ChildItem -LiteralPath $src -Force -ErrorAction Stop |
                ForEach-Object {
                  Copy-Item -LiteralPath $_.FullName -Destination $dest -Recurse -Force -ErrorAction Stop
                }
          }

          $zipPath = Join-Path $zipDir $env:BATCH_ZIP_NAME
          if (Test-Path -LiteralPath $zipPath) {
              Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -Path $batchRoot -DestinationPath $zipPath -CompressionLevel Optimal

      - name: Upload batch artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.packages.outputs.artifact_name }}
          path: |
            out/artifacts/winget-app-icons-batch-${{ github.run_id }}.zip
            out/summary.json
            out/requested-packages.json
          if-no-files-found: error
          retention-days: 14

  commit-results:
    name: Commit extracted package folders
    needs: extract
    if: ${{ !cancelled() && needs.extract.result == 'success' && inputs.auto_commit_results }}
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download batch artifact
        uses: actions/download-artifact@v4
        with:
          name: winget-icon-batch-${{ github.run_id }}
          path: import

      - name: Import batch and commit
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zipPath = Join-Path (Resolve-Path 'import').Path "winget-app-icons-batch-${env:GITHUB_RUN_ID}.zip"
          $requestPath = Join-Path (Resolve-Path 'import').Path 'requested-packages.json'
          if (-not (Test-Path -LiteralPath $zipPath)) {
              throw "Batch archive not found: $zipPath"
          }
          if (-not (Test-Path -LiteralPath $requestPath)) {
              throw "Requested package manifest not found: $requestPath"
          }
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git pull --rebase

          Expand-Archive -LiteralPath $zipPath -DestinationPath (Resolve-Path '.').Path -Force

          $requested = Get-Content -LiteralPath $requestPath -Raw -Encoding UTF8 | ConvertFrom-Json

          foreach ($pkg in $requested.packages) {
              $pkgPath = Join-Path 'winget-app-icons' $pkg
              if (Test-Path -LiteralPath $pkgPath) {
                  git add -- "$pkgPath"
              }
          }

          $cached = git diff --cached --name-only
          if (-not $cached) {
              Write-Host 'No package folder changes to commit.'
              return
          }

          git commit -m "chore: refresh winget icon batch ($($requested.packages.Count) packages, run $env:GITHUB_RUN_ID) [skip ci]"
          git push

      - name: Render commit summary
        if: always()
        shell: pwsh
        run: |
          "## Auto-commit" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Enabled for this run." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
